---
# tasks file for Roles/ldap
#1. Actualizar repositorios
- name: Actualizar repositorios y paquetes (update y upgrade)
  apt:
    update_cache: yes
    upgrade: yes
    cache_valid_time: 3600

# 2. sudo reboot
- name: Reiniciar el servidor si es necesario
  reboot:
    msg: "Reiniciando por actualización de sistema de Ansible"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime

# 3. DEBCONF SLAPD
- name: Incluir debconf de slapd
  import_tasks: slapd.yml

# 4. Instalación de paquetes 
- name: Instalación de paquetes
  apt:
    name:
      - slapd
      - ldap-utils
      - samba
      - smbclient
      - winbind
    state: present

# 5. DEBCONF LIBPAM-LDAPD
- name: Incluir debconf de libpam-ldapd
  import_tasks: libpam-winbind.yml

# 6. DEBCONF NSLCD
- name: Incluir debconf de nslcd
  import_tasks: nslcd.yml

- name: Configurar respuestas para nslcd (LDAP URI y Base)
  debconf:
    name: "nslcd"
    question: "{{ item.question }}"
    value: "{{ item.value }}"
    vtype: "{{ item.vtype }}"
  with_items:
    - { question: 'nslcd/ldap-uris', value: "{{ ldap_uri }}", vtype: 'string' }
    - { question: 'nslcd/ldap-base', value: "{{ ldap_base_dn }}", vtype: 'string' }


- name: Configurar nsswitch.conf para usar LDAP
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: "^{{ item }}:"
    line: "{{ item }}:         files ldap"
  with_items:
    - passwd
    - group
    - shadow


# 4. Instalación de paquetes (Ahora sí, sin interrupciones)
- name: Instalación de paquetes
  apt:
    name:
      - libpam-winbind
      - libnss-winbind
      - nslcd
    state: present


