# Instalación de paquete
- name: Instalación de dhcp
  apt:
    name:
      - isc-dhcp-server
    state: present
    update_cache: yes

- name: Configurar interfaz de escucha
  template:
    src: isc-dhcp-server.j2
    dest: /etc/default/isc-dhcp-server
    owner: root
    group: root
    mode: '0644'
  notify: Reiniciar DHCP

- name: Desplegar configuración del servicio (dhcpd.conf)
  template:
    src: dhcpd.conf.j2
    dest: /etc/dhcp/dhcpd.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reiniciar DHCP

- name: Asegurar que el servicio esté iniciado
  service:
    name: isc-dhcp-server
    state: started
    enabled: yes