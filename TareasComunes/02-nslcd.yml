---
- name: Configurar debconf para nslcd
  debconf:
    name: "nslcd"
    question: "{{ item.question }}"
    value: "{{ item.value }}"
    vtype: "{{ item.vtype }}"
  with_items:
    - { question: 'nslcd/ldap-uris', value: "{{ ldap_uri }}", vtype: 'string' }
    - { question: 'nslcd/ldap-base', value: "{{ ldap_base_dn }}", vtype: 'string' }
    - { question: 'nslcd/ldap-binddn', value: "{{ ldap_service_user_dn }}", vtype: 'string' }
    - { question: 'nslcd/ldap-bindpw', value: "{{ ldap_service_user_pass }}", vtype: 'password' }

- name: Configurar debconf para libnss-ldapd
  debconf:
    name: "libnss-ldapd"
    question: "libnss-ldapd/nsswitch"
    value: "group, passwd, shadow"
    vtype: "multiselect"

- name: Instalar nslcd y dependencias
  apt:
    name:
      - nslcd
      - libnss-ldapd
      - libpam-ldapd
      - nscd
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Configurar nsswitch.conf para usar ldap
  replace:
    path: /etc/nsswitch.conf
    regexp: '^(passwd|group|shadow):(\s+)files(.*)$'
    replace: '\1:          files ldap'

- name: Reiniciar nslcd
  service:
    name: nslcd
    state: restarted
    enabled: yes

- name: Reiniciar nscd
  service:
    name: nscd
    state: restarted
    enabled: yes